name: Render PDF

on:
  push:
    branches: [main]
    paths:
      - index.html
      - fonts/**

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Pango
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Render PDF
        run: uv run python render_resume.py

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git diff --staged --quiet || git commit -m "render: update resume.pdf" && git push
